        };

            "BUSTAMANTE": "cbustamante@crucianelli.com",
            "SCROFONO": "mscrofono@crucianelli.com",
            "DIPERNA": "ndiperna@crucianelli.com",
            "VALENTINI": "svalentini@crucianelli.com",
            "BONI": "rboni@crucianelli.com"
        };

        const SUPPLIER_TO_BUYER = {
            // COMPRADOR: VALENTINI
            "PIRANIFLAVIAALEJANDRA": "VALENTINI", "ARROYITOMAQUINARIASSRL": "VALENTINI", "MARCHETTIBRUNOIVAN": "VALENTINI",
            "CICCARELLISA": "VALENTINI", "BRACCANIFABIANANTONIO": "VALENTINI", "DIFSRL": "VALENTINI",
            "INTERFLONARGSA": "VALENTINI", "LACASADEPAPELSRL": "VALENTINI", "LUMATSOLUCIONESINDUSTRIALES": "VALENTINI",

            "ROSSIMARTINARIEL": "VALENTINI", "SISTEMASDEPINTADOSRL": "VALENTINI", "SOLSERSRL": "VALENTINI", "TUBIFLEXSA": "VALENTINI",

            "PROCESOSINDUSTRIALESMETALLOSA": "DIPERNA", "MARTINCOPPASA": "DIPERNA", "SERVICIOSINDUSTRIALESMETALLFELDSAS": "DIPERNA",

            // COMPRADOR: SCROFONO
            "ABRANORT": "SCROFONO", "FRANCEL": "SCROFONO", "CATALANO": "SCROFONO", "COLLOCA": "SCROFONO",
            "DGH": "SCROFONO", "DBH": "SCROFONO", "INGAP": "SCROFONO", "GOMAPAZ": "SCROFONO",
            "GRANATTO": "SCROFONO", "MONTES": "SCROFONO", "MENDEZ": "SCROFONO", "INVERSIONESYMANDATOS": "SCROFONO",
            "MACIEL": "SCROFONO", "MORO": "SCROFONO", "NIPLO": "SCROFONO", "PEYRANO": "SCROFONO",

            "BISTOTTOEDUARDOFABIAN": "SCROFONO", "BOSOLETTIJUANJOSE": "SCROFONO", "CIMINARIGISELAMARIA": "SCROFONO",
            "FABRINORSA": "SCROFONO", "HEINRICHGUSTAVOALBERTO": "SCROFONO", "GERBAUDOANIBALRAMON": "SCROFONO",
            "GERONZISA": "SCROFONO", "GIRESA": "SCROFONO", "JORGEYHERNANDEGRANDESRL": "SCROFONO",
            "MAGICCOLORSSA": "SCROFONO", "RAPPACHIANISRLONERA": "SCROFONO", "RICCIOTTILUCIANOARIEL": "SCROFONO",
            "METALURGICARAPACHIANISRL": "SCROFONO",

            // COMPRADOR: GIGLI
            "CADE": "GIGLI", "AGUDANIELSANTIAGO": "GIGLI", "ALBERTOJSPINSANTISRL": "GIGLI", "BARBIERIEHIJOSSRL": "GIGLI",
            "CIARROCCHISRL": "GIGLI", "CRUCIANELLIFABRILSA": "GIGLI", "DYNAMISSRL": "GIGLI", "EMUESTABLECIMIENTOSMETALURGICOS": "GIGLI",
            "ESTABMETALURGICOSONCATIVOSA": "GIGLI", "FABRICADEMOTORESORIPONSRL": "GIGLI", "GARROFABRILSA": "GIGLI",
            "GUDINOMARCOSDAMIAN": "GIGLI", "INGEPROSA": "GIGLI", "INGERSOLLARGENTINASA": "GIGLI", "LEAFAGROTRONICSRL": "GIGLI",
            "MANGUERASHIDRAULICASA": "GIGLI", "MARCONIFABIOCESAR": "GIGLI", "MECANIZADOSKOKESRL": "GIGLI",
            "METALURGICAMARCOSJUAREZSRL": "GIGLI", "METALURGICAOESTESRL": "GIGLI", "MUSIANCANCIANIYCIASAIC": "GIGLI",
            "OLEOHIDRAULICACASTROSRL": "GIGLI", "OLEOHIDRAULICAELTORITOSA": "GIGLI", "OLEOHIDRAULICATECNICORDSA": "GIGLI",
            "OSCARFRATTINIEHIJOSRL": "GIGLI", "PIRLESGUSTAVOJOSE": "GIGLI", "PRODUMATSA": "GIGLI", "SATOTSAS": "GIGLI",
            "TEKMATICSA": "GIGLI", "TULIANGABRIELFERNANDO": "GIGLI", "VESARGSRL": "GIGLI", "VGMECANIZADOSSA": "GIGLI",
            "ELINCA": "GIGLI", "LIFTGATESOCIEDADANONIMA": "GIGLI",

            // COMPRADOR: BUSTAMANTE
            "MEGBASA": "BUSTAMANTE", "INDUSTRIASGAM": "BUSTAMANTE", "GONZALOSANTILLI": "BUSTAMANTE", "TALLERESVEGA": "BUSTAMANTE", "CHOUSA": "BUSTAMANTE",
            
            // OTROS
            "AGCOARGENTINASOCIEDADANONIMA": "BONI"
        };

        function App() {
            const [activeTab, setActiveTab] = useState('planificacion');
            const [masterItems, setMasterItems] = useState([]);
            const [stockData, setStockData] = useState({});
            const [ocPendientes, setOcPendientes] = useState({});
            const [contratosData, setContratosData] = useState({});
            const [cuotasArrangement, setCuotasArrangement] = useState({});
            const [historial, setHistorial] = useState([]);
            
            const [searchTerm, setSearchTerm] = useState('');
            const [masterSearch, setMasterSearch] = useState('');
            const [filters, setFilters] = useState({});
            const [toast, setToast] = useState(null);
            const [showManualModal, setShowManualModal] = useState(false);
            const [showNotifyModal, setShowNotifyModal] = useState(false);
            const [manualItem, setManualItem] = useState({ codArt: '', descripcion: '', puntoPedido: 0, lote: 0, leadTime: 0 });

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            const normalize = (val) => String(val || '').trim().toUpperCase();
            
            const superNormalize = (val) => {
                let str = String(val || '');
                str = str.replace(/\(.*?\)/g, '');
                return str.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
            };

            const handleFileUpload = (e, type) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, { type: 'binary' });
                        const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                        let count = 0;

                        if (type === 'master') {
                            const nMaster = [...masterItems];
                            data.forEach(row => {
                                const skuRaw = row['SKU / COD ART.'] || row['COD ART.'] || row['SKU'] || '';
                                const sku = normalize(skuRaw);
                                if (!sku) return;
                                const idx = nMaster.findIndex(i => normalize(i.codArt) === sku);
                                const item = {
                                    codArt: skuRaw.trim(),
                                    descripcion: row['DESCRIPCIÓN'] || row['DESCRIPCION'] || 'S/D',
                                    puntoPedido: Number(row['PUNTO PEDIDO']) || 0,
                                    lote: Number(row['LOTE COMPRA']) || Number(row['LOTE']) || 0,
                                    leadTime: Number(row['LEAD TIME']) || 0
                                };
                                if (idx > -1) nMaster[idx] = item; else nMaster.push(item);
                                count++;
                            });
                            setMasterItems(nMaster);
                        } else if (type === 'stock') {
                            const nStock = { ...stockData };
                            data.forEach(row => {
                                const sku = normalize(row['SKU / COD ART.'] || row['COD ART.'] || row['SKU']);
                                if (sku) { 
                                    const val = Number(row['STOCK INICIAL']) || 0;
                                    nStock[sku] = (nStock[sku] || 0) + val; 
                                    count++; 
                                }
                            });
                            setStockData(nStock);
                        } else if (type === 'oc') {
                            const nOC = { ...ocPendientes };
                            data.forEach(row => {
                                const sku = normalize(row['SKU / COD ART.'] || row['COD ART.'] || row['SKU']);
                                if (sku) { 
                                    const val = Number(row['OC. PENDIENTE']) || 0;
                                    nOC[sku] = (nOC[sku] || 0) + val; 
                                    count++; 
                                }
                            });
                            setOcPendientes(nOC);
                        } else if (type === 'contrato') {
                            const nContratos = { ...contratosData };
                            data.forEach(row => {
                                const sku = normalize(row['SKU / COD ART.'] || row['COD ART.'] || row['SKU']);
                                const provRaw = row['PROVEEDOR'] || '';
                                const provKey = superNormalize(provRaw);
                                if (sku && provKey) {
                                    if (!nContratos[sku]) nContratos[sku] = {};
                                    nContratos[sku][provKey] = {
                                        contrato: String(row['CONTRATO MARCO'] || '').trim(),
                                        posicion: String(row['POSICION'] || '').trim(),
                                        nombreOriginal: provRaw.trim()
                                    };
                                    count++;
                                }
                            });
                            setContratosData(nContratos);
                        } else if (type === 'cuota') {
                            const nCuotas = { ...cuotasArrangement };
                            data.forEach(row => {
                                const sku = normalize(row['SKU / COD ART.'] || row['COD ART.'] || row['SKU']);
                                const provRaw = row['PROVEEDOR'] || '';
                                const provKey = superNormalize(provRaw);
                                const cuotaVal = Number(row['CUOTA']) || 0;

                                if (sku && provKey) {
                                    if (!nCuotas[sku]) nCuotas[sku] = [];
                                    const existIdx = nCuotas[sku].findIndex(c => superNormalize(c.proveedor) === provKey);
                                    
                                    if (existIdx > -1) {
                                        if (cuotaVal > nCuotas[sku][existIdx].cuota) {
                                            nCuotas[sku][existIdx].cuota = cuotaVal;
                                            nCuotas[sku][existIdx].proveedorOriginal = provRaw.trim();
                                        }
                                    } else {
                                        nCuotas[sku].push({ 
                                            proveedor: provKey, 
                                            cuota: cuotaVal, 
                                            proveedorOriginal: provRaw.trim() 
                                        });
                                    }
                                    count++;
                                }
                            });

                            Object.keys(nCuotas).forEach(sku => {
                                nCuotas[sku] = nCuotas[sku].filter(item => item.cuota > 0);
                            });

                            setCuotasArrangement(nCuotas);
                        }
                        showToast(`Carga exitosa: ${count} registros procesados.`);
                    } catch (err) {
                        showToast("Error al procesar el archivo Excel.", "error");
                    }
                };
                reader.readAsBinaryString(file);
                e.target.value = null;
            };

            const calculatedData = useMemo(() => {
                const today = new Date();
                return masterItems.flatMap(item => {
                    const skuKey = normalize(item.codArt);
                    const stock = stockData[skuKey] || 0;
                    const oc = ocPendientes[skuKey] || 0;
                    const totalDisp = stock + oc;
                    const comprar = totalDisp < item.puntoPedido;
                    
                    let cantTotalAReponer = 0;
                    if (comprar) {
                        const faltante = item.puntoPedido - totalDisp;
                        if (item.lote > 0) {
                            const multiplicador = Math.ceil(faltante / item.lote);
                            cantTotalAReponer = multiplicador * item.lote;
                        } else {
                            cantTotalAReponer = faltante;
                        }
                    }
                    
                    let fechaSug = '-';
                    if (comprar) {
                        const d = new Date(today);
                        d.setDate(d.getDate() + item.leadTime);
                        fechaSug = d.toLocaleDateString();
                    }

                    const skuCuotas = cuotasArrangement[skuKey];
                    
                    if (!skuCuotas || skuCuotas.length === 0) {
                        const provKeysInContratos = Object.keys(contratosData[skuKey] || {});
                        if (provKeysInContratos.length > 0) {
                            return provKeysInContratos.map(pk => {
                                const cInfo = contratosData[skuKey][pk];
                                return { 
                                    ...item, stock, oc, totalDisp, comprar, fechaSug, 
                                    proveedor: cInfo.nombreOriginal, 
                                    contrato: cInfo.contrato || 'No existe contrato marco', 
                                    posicion: cInfo.posicion || '-', 
                                    cuota: 100,
                                    cantidadSugerida: cantTotalAReponer,
                                    tieneContratoReal: !!(cInfo.contrato && cInfo.contrato !== '')
                                };
                            });
                        }
                        return [{ 
                            ...item, stock, oc, totalDisp, comprar, fechaSug, 
                            proveedor: '-', 
                            contrato: 'No existe contrato marco', 
                            posicion: '-', 
                            cuota: 100,
                            cantidadSugerida: cantTotalAReponer,
                            tieneContratoReal: false
                        }];
                    }

                    return skuCuotas.map(q => {
                        const provKeyDeCuota = superNormalize(q.proveedor);
                        let cInfo = contratosData[skuKey]?.[provKeyDeCuota];
                        let backupContrato = false;

                        if (!cInfo) {
                            const availableProvs = Object.keys(contratosData[skuKey] || {});
                            const partialMatchKey = availableProvs.find(pk => pk.includes(provKeyDeCuota) || provKeyDeCuota.includes(pk));
                            if (partialMatchKey) {
                                cInfo = contratosData[skuKey][partialMatchKey];
                            }
                        }
                        
                        let contratoTxt = 'No existe contrato marco';
                        let posicionTxt = '-';
                        let realMatch = false;

                        if (cInfo && cInfo.contrato && cInfo.contrato !== '') {
                            contratoTxt = cInfo.contrato;
                            posicionTxt = cInfo.posicion || '-';
                            realMatch = true;
                        } else {
                            const skuContracts = Object.keys(contratosData[skuKey] || {});
                            if (skuContracts.length > 0) {
                                const altProvKey = skuContracts[0];
                                const altInfo = contratosData[skuKey][altProvKey];
                                contratoTxt = `${altInfo.contrato} (Prov: ${altInfo.nombreOriginal})`;
                                posicionTxt = altInfo.posicion || '-';
                                backupContrato = true;
                            }
                        }

                        const cantSugeridaProv = (cantTotalAReponer * q.cuota) / 100;

                        return { 
                            ...item, stock, oc, totalDisp, comprar, fechaSug, 
                            proveedor: q.proveedorOriginal, 
                            contrato: contratoTxt, 
                            posicion: posicionTxt, 
                            cuota: q.cuota,
                            cantidadSugerida: cantSugeridaProv,
                            tieneContratoReal: realMatch && !backupContrato
                        };
                    });
                });
            }, [masterItems, stockData, ocPendientes, contratosData, cuotasArrangement]);

            const filtered = useMemo(() => {
                return calculatedData.filter(i => {
                    const matchSearch = normalize(i.codArt).includes(normalize(searchTerm)) || normalize(i.descripcion).includes(normalize(searchTerm));
                    const matchFilters = Object.keys(filters).every(key => {
                        if (!filters[key]) return true;
                        return String(i[key] || '').toLowerCase().includes(filters[key].toLowerCase());
                    });
                    return matchSearch && matchFilters;
                });
            }, [calculatedData, searchTerm, filters]);

            const missingContracts = useMemo(() => {
                const grouped = {};
                calculatedData.filter(i => !i.tieneContratoReal && i.proveedor !== '-').forEach(item => {
                    if (!grouped[item.proveedor]) grouped[item.proveedor] = [];
                    grouped[item.proveedor].push(item);
                });
                return grouped;
            }, [calculatedData]);

            const filteredMasterItems = useMemo(() => {
                return masterItems.filter(i => 
                    normalize(i.codArt).includes(normalize(masterSearch)) || 
                    normalize(i.descripcion).includes(normalize(masterSearch))
                );
            }, [masterItems, masterSearch]);

            const exportExcel = () => {
                const target = filtered.filter(i => i.comprar);
                if (target.length === 0) return showToast("No hay compras para exportar.", "error");
                
                const rows = target.map(i => ({
                    'COD ART.': i.codArt,
                    'DESCRIPCION': i.descripcion,
                    'CANT. A PEDIR': i.cantidadSugerida,
                    'PROVEEDOR': i.proveedor,
                    'CONTRATO MARCO': i.contrato,
                    'POS.': i.posicion,
                    'FECHA SUG.': i.fechaSug
                }));
                const ws = XLSX.utils.json_to_sheet(rows);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Plan de Compras");
                const filename = `Plan_Crucianelli_${new Date().toISOString().split('T')[0]}.xlsx`;
                XLSX.writeFile(wb, filename);
                
                setHistorial([{ 
                    id: Date.now(), 
                    fecha: new Date().toLocaleString(), 
                    count: target.length,
                    itemsData: [...target] 
                }, ...historial]);
                
                showToast("Plan exportado correctamente.");
            };

            const downloadFromHistory = (itemsData, fechaStr) => {
                const rows = itemsData.map(i => ({
                    'COD ART.': i.codArt,
                    'DESCRIPCION': i.descripcion,
                    'CANT. A PEDIR': i.cantidadSugerida,
                    'PROVEEDOR': i.proveedor,
                    'CONTRATO MARCO': i.contrato,
                    'POS.': i.posicion,
                    'FECHA SUG.': i.fechaSug
                }));
                const ws = XLSX.utils.json_to_sheet(rows);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Plan de Compras");
                XLSX.writeFile(wb, `Recuperado_Crucianelli_${fechaStr.replace(/[/:\s]/g, '_')}.xlsx`);
            };

            // FUNCIÓN CORREGIDA PARA EVITAR ERROR DE URL LARGA
            const sendEmailToBuyer = (proveedor, items) => {
                const provKey = superNormalize(proveedor);
                const buyerCode = SUPPLIER_TO_BUYER[provKey] || "GIGLI";
                const emailTo = BUYER_MAPPING[buyerCode];
                
                const subject = `SCM: REVISIÓN DE CONTRATOS/CUOTAS - ${proveedor.toUpperCase()}`;
                
                const itemsWithAlternative = items.filter(i => i.contrato.includes('(Prov:'));
                const itemsWithNoContract = items.filter(i => i.contrato === 'No existe contrato marco');

                // LÍMITE DE SEGURIDAD PARA URL (Aprox 1800 chars para ser safe)
                const MAX_ITEMS_IN_BODY = 15; 

                let body = `Estimado Comprador,\n\n`;
                body += `Se han detectado inconsistencias en los artículos asignados al proveedor ${proveedor.toUpperCase()} que requieren su intervención.\n\n`;

                if (itemsWithAlternative.length > 0) {
                    body += `1) REVISAR CUOTA - Contratos alternativos:\n`;
                    const list = itemsWithAlternative.slice(0, MAX_ITEMS_IN_BODY).map(i => `- ${i.codArt}: ${i.descripcion}`).join('\n');
                    body += list;
                    if(itemsWithAlternative.length > MAX_ITEMS_IN_BODY) body += `\n... (Hay ${itemsWithAlternative.length - MAX_ITEMS_IN_BODY} ítems más, ver en sistema)`;
                    body += `\n\n`;
                }

                if (itemsWithNoContract.length > 0) {
                    body += `2) ACTUALIZAR INFO - Sin contrato marco:\n`;
                    const list = itemsWithNoContract.slice(0, MAX_ITEMS_IN_BODY).map(i => `- ${i.codArt}: ${i.descripcion}`).join('\n');
                    body += list;
                    if(itemsWithNoContract.length > MAX_ITEMS_IN_BODY) body += `\n... (Hay ${itemsWithNoContract.length - MAX_ITEMS_IN_BODY} ítems más, ver en sistema)`;
                    body += `\n\n`;
                }
                
                body += `Por favor, solicitamos regularizar estos casos para asegurar el flujo de planificación.\n\n`;
                body += `Saludos,\n`;
                body += `Equipo Planificación - Crucianelli`;

                // Usamos encodeURIComponent para asegurar que caracteres raros no rompan la URL
                const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${emailTo}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

                try {
                    const win = window.open(gmailUrl, '_blank');
                    if (!win || win.closed || typeof win.closed == 'undefined') {
                        // Fallback si el popup falla
                        const mailtoUrl = `mailto:${emailTo}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                        window.location.href = mailtoUrl;
                    } else {
                        showToast(`Abriendo Gmail para ${buyerCode}...`);
                    }
                } catch (e) {
                    showToast("Error al abrir cliente de correo", "error");
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    {toast && (
                        <div className={`fixed bottom-10 right-10 z-[200] px-6 py-3 rounded-xl shadow-2xl text-white font-bold toast-enter ${toast.type === 'error' ? 'bg-red-600' : 'bg-emerald-600'}`}>
                            {toast.message}
                        </div>
                    )}

                    {showNotifyModal && (
                        <div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-2xl shadow-2xl overflow-hidden border border-slate-200">
                                <div className="bg-slate-900 p-6 text-white flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-amber-500 p-2 rounded-lg text-slate-900"><Icons.Alert /></div>
                                        <h3 className="font-black uppercase text-sm tracking-widest">Análisis de Faltantes</h3>
                                    </div>
                                    <button onClick={() => setShowNotifyModal(false)} className="hover:rotate-90 transition-transform"><Icons.Close /></button>
                                </div>
                                <div className="p-6 max-h-[60vh] overflow-y-auto space-y-4 no-scrollbar">
                                    {Object.keys(missingContracts).length === 0 ? (
                                        <div className="p-10 text-center text-slate-400 font-bold italic uppercase tracking-widest">Todos los ítems con cuota tienen contrato vigente</div>
                                    ) : (
                                        Object.entries(missingContracts).map(([prov, items]) => (
                                            <div key={prov} className="bg-slate-50 p-5 rounded-2xl border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4 hover:border-red-200 transition-colors">
                                                <div className="flex-1 text-center md:text-left">
                                                    <h4 className="font-black text-red-600 uppercase text-xs mb-1">{prov}</h4>
                                                    <div className="flex flex-col gap-0.5">
                                                        <p className="text-[10px] font-bold text-slate-500 tracking-tight">
                                                            • {items.filter(i => i.contrato.includes('(Prov:')).length} para revisar cuota.
                                                        </p>
                                                        <p className="text-[10px] font-bold text-slate-500 tracking-tight">
                                                            • {items.filter(i => i.contrato === 'No existe contrato marco').length} sin contrato alguno.
                                                        </p>
                                                    </div>
                                                </div>
                                                <button 
                                                    onClick={() => sendEmailToBuyer(prov, items)}
                                                    className="bg-slate-900 text-white px-6 py-2.5 rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center gap-2 hover:bg-red-600 transition-all shadow-md active:scale-95"
                                                >
                                                    <Icons.Mail /> Notificar Comprador
                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>
                                <div className="bg-slate-50 p-6 border-t text-center">
                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">Cruce automático Crucianelli - Gestión de Suministros</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {showManualModal && (
                        <div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden border border-slate-200">
                                <div className="bg-slate-800 p-4 text-white flex justify-between items-center">
                                    <h3 className="font-bold uppercase text-xs tracking-widest">Alta Manual de Artículo</h3>
                                    <button onClick={() => setShowManualModal(false)} className="hover:rotate-90 transition-transform"><Icons.Close /></button>
                                </div>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const skuKey = normalize(manualItem.codArt);
                                    const idx = masterItems.findIndex(i => normalize(i.codArt) === skuKey);
                                    let nm = [...masterItems];
                                    if(idx > -1) nm[idx] = manualItem; else nm.push(manualItem);
                                    setMasterItems(nm);
                                    setShowManualModal(false);
                                    showToast("Artículo guardado.");
                                }} className="p-6 space-y-4">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">COD ART.</label>
                                        <input required className="w-full border p-2.5 rounded-xl outline-none focus:ring-2 focus:ring-red-500 text-sm font-bold uppercase" value={manualItem.codArt} onChange={e => setManualItem({...manualItem, codArt: e.target.value.toUpperCase()})} />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Descripción</label>
                                        <input className="w-full border p-2.5 rounded-xl outline-none focus:ring-2 focus:ring-red-500 text-sm" value={manualItem.descripcion} onChange={e => setManualItem({...manualItem, descripcion: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-3 gap-3">
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Pto Pedido</label><input type="number" className="w-full border p-2.5 rounded-xl text-sm font-bold" value={manualItem.puntoPedido} onChange={e => setManualItem({...manualItem, puntoPedido: Number(e.target.value)})} /></div>
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Lote</label><input type="number" className="w-full border p-2.5 rounded-xl text-sm font-bold" value={manualItem.lote} onChange={e => setManualItem({...manualItem, lote: Number(e.target.value)})} /></div>
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">LT (Días)</label><input type="number" className="w-full border p-2.5 rounded-xl text-sm font-bold" value={manualItem.leadTime} onChange={e => setManualItem({...manualItem, leadTime: Number(e.target.value)})} /></div>
                                    </div>
                                    <button className="w-full bg-red-600 text-white font-black py-3.5 rounded-2xl mt-4 shadow-lg shadow-red-200 hover:bg-red-700 transition-all active:scale-[0.98] text-xs uppercase tracking-widest">Guardar en Maestro</button>
                                </form>
                            </div>
                        </div>
                    )}

                    <header className="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
                        <div className="max-w-[1700px] mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-6">
                                <div className="flex items-center justify-center h-16 w-auto">
                                    <img 
                                        src="https://i.ibb.co/Mx5tJYY8/logo-jpg.jpg" 
                                        alt="Crucianelli Logo" 
                                        className="h-14 w-auto object-contain"
                                        onError={(e) => e.target.style.display='none'}
                                    />
                                </div>
                                <h1 className="text-xl font-black text-slate-800 uppercase tracking-tight leading-none">
                                    PLANIFICACION DE COMPRAS <span className="text-red-600">CRUCIANELLI</span>
                                </h1>
                            </div>
                            <div className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] hidden sm:block">
                                {new Date().toLocaleDateString('es-ES', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'})}
                            </div>
                        </div>
                        <nav className="max-w-[1700px] mx-auto px-6 flex border-t bg-slate-50/50 overflow-x-auto no-scrollbar">
                            {['planificacion', 'maestro', 'importar', 'historial'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`px-6 py-4 text-[10px] font-black uppercase tracking-[0.15em] transition-all whitespace-nowrap ${activeTab === tab ? 'text-red-600 border-b-2 border-red-600 bg-white shadow-inner' : 'text-slate-400 hover:text-slate-600'}`}>{tab}</button>
                            ))}
                        </nav>
                    </header>

                    <main className="max-w-[1700px] mx-auto p-4 md:p-8">
                        {activeTab === 'planificacion' && (
                            <div className="space-y-4">
                                <div className="bg-white p-5 rounded-[2rem] border flex flex-col lg:flex-row gap-4 justify-between items-center shadow-sm">
                                    <div className="relative w-full lg:w-[450px]">
                                        <div className="absolute left-4 top-3 text-slate-300"><Icons.Search /></div>
                                        <input type="text" placeholder="Buscar por código o descripción..." className="w-full pl-12 pr-4 py-3 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-red-500 outline-none text-sm transition-all font-medium uppercase" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                    </div>
                                    <div className="flex flex-wrap gap-3 w-full lg:w-auto justify-center">
                                        <button 
                                            onClick={() => setShowNotifyModal(true)} 
                                            className="flex-1 lg:flex-none bg-slate-900 text-white px-6 py-3.5 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-3 hover:bg-red-600 transition-all shadow-xl active:scale-95"
                                        >
                                            <Icons.Alert /> Notificar Faltantes
                                        </button>
                                        <button onClick={exportExcel} className="flex-1 lg:flex-none bg-emerald-600 text-white px-8 py-3.5 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-3 hover:bg-emerald-700 transition-all shadow-xl shadow-emerald-100 active:scale-95">
                                            <Icons.Download /> Generar Compra
                                        </button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-[2.5rem] border shadow-2xl overflow-hidden">
                                    <div className="overflow-x-auto max-h-[70vh] overflow-y-auto relative no-scrollbar">
                                        <table className="w-full text-left text-[11px] border-collapse">
                                            <thead className="bg-slate-900 text-white uppercase font-black tracking-tighter sticky-header">
                                                <tr>
                                                    <th className="p-4 bg-slate-900">COD ART.</th>
                                                    <th className="p-4 bg-slate-900">DESCRIPCION</th>
                                                    <th className="p-4 text-center bg-slate-900">STOCK</th>
                                                    <th className="p-4 text-center bg-slate-900">OC PEND.</th>
                                                    <th className="p-4 text-center bg-slate-900 border-x border-slate-800">PTO PEDIDO</th>
                                                    <th className="p-4 text-center bg-red-800 font-bold">LOTE</th>
                                                    <th className="p-4 text-center bg-orange-600 text-white font-black">CANT. PEDIR</th>
                                                    <th className="p-4 text-center bg-slate-900">LT</th>
                                                    <th className="p-4 text-center bg-slate-900 whitespace-nowrap">¿COMPRAR?</th>
                                                    <th className="p-4 text-center bg-slate-900 whitespace-nowrap">FECHA SUG.</th>
                                                    <th className="p-4 bg-red-800 border-l border-red-700">PROVEEDOR</th>
                                                    <th className="p-4 bg-red-800">CONTRATO MARCO</th>
                                                    <th className="p-4 bg-red-800 text-center">POS.</th>
                                                    <th className="p-4 bg-red-800 text-center">CUOTA %</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 font-medium text-slate-700">
                                                <tr className="bg-slate-800 text-slate-400 sticky-filters">
                                                    {['codArt', 'descripcion', 'stock', 'oc', 'puntoPedido', 'lote', 'cantidadSugerida', 'leadTime', 'comprar', 'fechaSug', 'proveedor', 'contrato', 'posicion', 'cuota'].map(col => (
                                                        <th key={`f-${col}`} className="px-2 py-1 text-center font-normal bg-slate-800 border-none">
                                                            <input className="w-full p-1 bg-slate-700 border-none rounded text-[9px] outline-none placeholder:text-slate-600 text-white font-normal" placeholder="..." onChange={e => setFilters({...filters, [col]: e.target.value})} />
                                                        </th>
                                                    ))}
                                                </tr>
                                                {filtered.map((i, idx) => (
                                                    <tr key={`${i.codArt}-${i.proveedor}-${idx}`} className={`hover:bg-red-50/30 transition-colors ${i.comprar ? 'bg-red-50/40' : ''}`}>
                                                        <td className="p-4 font-black text-red-700 whitespace-nowrap">{i.codArt}</td>
                                                        <td className="p-4 text-slate-500 uppercase leading-tight max-w-[200px] truncate font-semibold" title={i.descripcion}>{i.descripcion}</td>
                                                        <td className="p-4 text-center font-bold text-slate-700">{i.stock}</td>
                                                        <td className="p-4 text-center font-bold text-orange-600">{i.oc}</td>
                                                        <td className="p-4 text-center font-black text-slate-900 bg-slate-50/50">{i.puntoPedido}</td>
                                                        <td className="p-4 text-center font-bold text-red-600">{i.lote}</td>
                                                        <td className="p-4 text-center font-black text-slate-900 bg-orange-100/50">{i.cantidadSugerida}</td>
                                                        <td className="p-4 text-center text-slate-400 font-bold">{i.leadTime} d</td>
                                                        <td className="p-4 font-black text-center whitespace-nowrap">{i.comprar ? <span className="text-red-600">SÍ</span> : <span className="text-slate-300 uppercase">NO</span>}</td>
                                                        <td className="p-4 font-bold text-emerald-600 text-center whitespace-nowrap">{i.fechaSug}</td>
                                                        <td className="p-4 font-black text-red-700 uppercase italic leading-tight text-[10px]">{i.proveedor}</td>
                                                        <td className={`p-4 font-bold text-[10px] leading-tight ${i.contrato === 'No existe contrato marco' ? 'text-red-400 italic' : (i.contrato.includes('Prov:') ? 'text-amber-600 italic' : 'text-slate-600 uppercase')}`}>
                                                            {i.contrato}
                                                        </td>
                                                        <td className="p-4 text-center font-bold text-slate-400">{i.posicion}</td>
                                                        <td className="p-4 text-center"><span className="bg-green-600 text-white px-2.5 py-1 rounded-full font-black text-[9px]">{i.cuota}%</span></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    {filtered.length === 0 && <div className="p-32 text-center text-slate-400 italic font-bold uppercase tracking-widest">Sin resultados en la planificación</div>}
                                </div>
                            </div>
                        )}

                        {activeTab === 'maestro' && (
                            <div className="max-w-6xl mx-auto space-y-6">
                                <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm flex flex-col md:flex-row justify-between items-center gap-6">
                                    <div className="flex-1 text-center md:text-left">
                                        <h2 className="text-2xl font-black text-slate-800 uppercase tracking-tighter">Maestro de productos</h2>
                                        <p className="text-slate-500 text-xs font-semibold uppercase tracking-widest mt-1 italic font-bold">Base de datos Crucianelli</p>
                                    </div>
                                    <div className="relative w-full md:w-64 shadow-inner">
                                        <div className="absolute left-3 top-2.5 text-slate-300"><Icons.Search size={16} /></div>
                                        <input type="text" placeholder="Buscar código..." className="w-full pl-10 pr-4 py-2 bg-slate-50 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none text-xs font-bold uppercase" value={masterSearch} onChange={e => setMasterSearch(e.target.value)} />
                                    </div>
                                    <div className="flex gap-3">
                                        <label className="bg-red-600 text-white px-6 py-3.5 rounded-2xl cursor-pointer font-black text-[10px] uppercase tracking-widest hover:bg-red-700 transition-all shadow-xl shadow-red-100 flex items-center gap-2">
                                            <Icons.Upload /> SUBIR MAESTRO
                                            <input type="file" className="hidden" onChange={e => handleFileUpload(e, 'master')} />
                                        </label>
                                        <button onClick={() => setShowManualModal(true)} className="bg-slate-900 text-white px-6 py-3.5 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center gap-2 hover:bg-black transition-all shadow-xl active:scale-95">
                                            <Icons.Plus size={14} /> MANUAL +
                                        </button>
                                    </div>
                                </div>
                                <div className="bg-white rounded-[2.5rem] border shadow-sm overflow-hidden overflow-y-auto max-h-[70vh]">
                                    <table className="w-full text-left text-xs relative border-collapse">
                                        <thead className="bg-slate-50 text-slate-400 uppercase font-black tracking-widest border-b sticky-header">
                                            <tr>
                                                <th className="p-6 text-red-600 bg-slate-50">COD ART.</th>
                                                <th className="p-6 bg-slate-50">DESCRIPCIÓN</th>
                                                <th className="p-6 text-center bg-slate-50">PTO PEDIDO</th>
                                                <th className="p-6 text-center bg-slate-50">LOTE COMPRA</th>
                                                <th className="p-6 text-center bg-slate-50">LEAD TIME</th>
                                                <th className="p-6 text-center text-red-500 font-black bg-slate-50">ELIMINAR</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y font-medium text-slate-600">
                                            {filteredMasterItems.map(i => (
                                                <tr key={i.codArt} className="hover:bg-slate-50 transition-colors uppercase">
                                                    <td className="p-6 font-black text-slate-900">{i.codArt}</td>
                                                    <td className="p-6 text-slate-500 font-semibold">{i.descripcion}</td>
                                                    <td className="p-6 text-center font-black bg-slate-50/30">{i.puntoPedido}</td>
                                                    <td className="p-6 text-center font-bold text-slate-400">{i.lote}</td>
                                                    <td className="p-6 text-center font-bold text-red-600">{i.leadTime} d</td>
                                                    <td className="p-6 text-center"><button onClick={() => setMasterItems(masterItems.filter(x => normalize(x.codArt) !== normalize(i.codArt)))} className="text-slate-300 hover:text-red-600 p-2 transition-colors"><Icons.Trash /></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'importar' && (
                            <div className="max-w-6xl mx-auto space-y-10">
                                <div className="bg-slate-900 p-12 rounded-[3rem] text-white shadow-2xl relative overflow-hidden">
                                    <div className="relative z-10">
                                        <h2 className="text-3xl font-black mb-4 uppercase tracking-tighter">Central de Suministros</h2>
                                        <p className="text-slate-400 text-sm max-w-2xl leading-relaxed font-medium italic">Normalización activa: El sistema cruza contratos ignorando códigos numéricos entre paréntesis e identificando contratos alternativos.</p>
                                    </div>
                                    <Icons.History className="absolute -right-20 -bottom-20 w-96 h-96 text-white/5 rotate-12" />
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 text-center">
                                    <ImportBox title="Stock Inicial" count={Object.keys(stockData).length} onFile={e => handleFileUpload(e, 'stock')} icon={Icons.Package} />
                                    <ImportBox title="OC Pendientes" count={Object.keys(ocPendientes).length} onFile={e => handleFileUpload(e, 'oc')} icon={Icons.History} />
                                    <ImportBox title="Contrato Marco" count={Object.values(contratosData).reduce((acc, curr) => acc + Object.keys(curr).length, 0)} onFile={e => handleFileUpload(e, 'contrato')} icon={Icons.File} />
                                    <ImportBox title="Cuota (Reparto)" count={Object.values(cuotasArrangement).flat().length} onFile={e => handleFileUpload(e, 'cuota')} icon={Icons.Users} highlight />
                                </div>
                            </div>
                        )}

                        {activeTab === 'historial' && (
                            <div className="max-w-3xl mx-auto space-y-4 font-medium">
                                <div className="bg-white p-8 rounded-[2rem] border shadow-sm mb-6 text-center md:text-left">
                                    <h2 className="text-2xl font-black text-slate-800 uppercase tracking-tighter">Historial Logístico</h2>
                                    <p className="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mt-2 text-center md:text-left italic font-bold">Registro Crucianelli - Armstrong, SF</p>
                                </div>
                                {historial.map(h => (
                                    <div key={h.id} className="bg-white p-6 rounded-3xl border-l-[10px] border-l-red-600 shadow-sm flex flex-col md:flex-row justify-between items-center group hover:scale-[1.01] transition-all gap-4">
                                        <div className="text-center md:text-left">
                                            <div className="font-black text-slate-800 text-lg uppercase tracking-tighter">{h.fecha}</div>
                                            <div className="text-[10px] uppercase font-black text-slate-400 tracking-widest mt-1">Exportación ({h.count} ítems)</div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button 
                                                onClick={() => downloadFromHistory(h.itemsData, h.fecha)}
                                                className="bg-emerald-50 text-emerald-600 hover:bg-emerald-600 hover:text-white px-5 py-2.5 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all flex items-center gap-2"
                                            >
                                                <Icons.Download size={16} /> Recuperar Excel
                                            </button>
                                        </div>
                                    </div>
                                ))}
                                {historial.length === 0 && <div className="p-32 text-center text-slate-200 font-black text-4xl border-4 border-dashed rounded-[3rem] uppercase tracking-widest">Sin Historial</div>}
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 bg-slate-900 text-white text-[9px] py-2 px-8 flex justify-between items-center z-50 uppercase font-black tracking-widest border-t border-white/5 shadow-2xl">
                        <div className="flex items-center gap-6">
                            <span className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-full bg-green-600 shadow-[0_0_10px_rgba(220,38,38,0.8)] animate-pulse"></div> Supply Chain</span>
                            <span className="opacity-40 font-bold italic tracking-tighter">Crucianelli - Armstrong, SF</span>
                        </div>
                        <div className="text-slate-600 tracking-tighter italic font-semibold hidden md:block">Renzo Boni-2026</div>
                    </footer>
                </div>
            );
        }

        const ImportBox = ({ title, count, onFile, icon: Icon, highlight }) => (
            <div className={`bg-white p-8 rounded-[2rem] border shadow-sm text-center hover:shadow-2xl hover:-translate-y-2 transition-all group ${highlight ? 'border-red-200 bg-red-50/20' : 'border-slate-100'}`}>
                <div className={`w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-6 transition-all duration-300 ${highlight ? 'bg-red-600 text-white shadow-lg shadow-green-100 rotate-3' : 'bg-slate-100 text-slate-400 group-hover:bg-red-600 group-hover:text-white group-hover:rotate-6'}`}>
                    <Icon size={32} />
                </div>
                <h3 className="font-black text-slate-800 mb-1 text-[10px] uppercase tracking-widest leading-none">{title}</h3>
                <div className={`text-4xl font-black mb-6 ${highlight ? 'text-red-600' : 'text-slate-800 group-hover:text-red-600 transition-colors'}`}>{count}</div>
                <label className={`block w-full py-3.5 rounded-2xl cursor-pointer font-black text-[9px] uppercase tracking-widest transition-all ${highlight ? 'bg-red-600 text-white hover:bg-red-700 shadow-lg shadow-red-200' : 'bg-slate-900 text-white hover:bg-red-600 shadow-md active:scale-95'}`}>
                    Elegir Excel
                    <input type="file" className="hidden" onChange={onFile} />
                </label>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
