<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCM Planner - Crucianelli (Full Cloud)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, addDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5dWvn5mjbL6PVMW2-6rQM6T2yKDa1ATY",
            authDomain: "gen-lang-client-0705722437.firebaseapp.com",
            projectId: "gen-lang-client-0705722437",
            storageBucket: "gen-lang-client-0705722437.firebasestorage.app",
            messagingSenderId: "316462800741",
            appId: "1:316462800741:web:24e4b95ad44982378a8b8c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'crucianelli-scm-planner';

        window.FB = { db, auth, appId, doc, setDoc, getDoc, collection, onSnapshot, query, addDoc, deleteDoc, writeBatch, signInAnonymously, onAuthStateChanged };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-overlay { background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .sticky-header th { position: sticky; top: 0; z-index: 20; }
        .sticky-filters th { position: sticky; top: 38px; z-index: 19; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #ef4444; border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icons = {
            Upload: ({ size = 20 }) => <svg width={size} height={size} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>,
            Download: ({ size = 20 }) => <svg width={size} height={size} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
            Trash: ({ size = 20 }) => <svg width={size} height={size} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
            Search: ({ size = 20 }) => <svg width={size} height={size} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            Close: ({ size = 24 }) => <svg width={size} height={size} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18M6 6l12 12" /></svg>,
            Mail: ({ size = 18 }) => <svg width={size} height={size} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>,
            History: ({ size = 32 }) => <svg width={size} height={size} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>,
            Alert: ({ size = 18 }) => <svg width={size} height={size} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        };

        const BUYER_MAPPING = {
            "GIGLI": "gigli@crucianelli.com", "BUSTAMANTE": "cbustamante@crucianelli.com", "SCROFONO": "mscrofono@crucianelli.com",
            "DIPERNA": "ndiperna@crucianelli.com", "VALENTINI": "svalentini@crucianelli.com", "BONI": "rboni@crucianelli.com"
        };

        const SUPPLIER_TO_BUYER = {
            "PIRANIFLAVIAALEJANDRA": "VALENTINI", "ARROYITOMAQUINARIASSRL": "VALENTINI", "MARCHETTIBRUNOIVAN": "VALENTINI",
            "CICCARELLISA": "VALENTINI", "BRACCANIFABIANANTONIO": "VALENTINI", "DIFSRL": "VALENTINI",
            "PROCESOSINDUSTRIALESMETALLOSA": "DIPERNA", "MARTINCOPPASA": "DIPERNA", "LABULONERADEVILASRL": "DIPERNA",
            "ABRANORT": "SCROFONO", "FRANCEL": "SCROFONO", "CATALANO": "SCROFONO",
            "CADE": "GIGLI", "AGUDANIELSANTIAGO": "GIGLI", "ALBERTOJSPINSANTISRL": "GIGLI",
            "MEGBASA": "BUSTAMANTE", "INDUSTRIASGAM": "BUSTAMANTE",
            "AGCOARGENTINASOCIEDADANONIMA": "BONI"
        };

        function App() {
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [authError, setAuthError] = useState(null);
            const [activeTab, setActiveTab] = useState('planificacion');
            
            const [masterItems, setMasterItems] = useState([]);
            const [stockData, setStockData] = useState({});
            const [ocPendientes, setOcPendientes] = useState({});
            const [contratosData, setContratosData] = useState({});
            const [cuotasArrangement, setCuotasArrangement] = useState({});
            const [historial, setHistorial] = useState([]);
            
            const [searchTerm, setSearchTerm] = useState('');
            const [filters, setFilters] = useState({});
            const [showNotifyModal, setShowNotifyModal] = useState(false);
            const [toast, setToast] = useState(null);

            useEffect(() => {
                const initAuth = async () => {
                    while (!window.FB) await new Promise(r => setTimeout(r, 200));
                    const { auth, signInAnonymously, onAuthStateChanged, db, appId, collection, query, onSnapshot } = window.FB;
                    try {
                        await signInAnonymously(auth);
                        onAuthStateChanged(auth, (u) => {
                            if (u) {
                                setUser(u);
                                // Listeners Firestore
                                onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'master')), (s) => setMasterItems(s.docs.map(d => d.data())), (e) => console.error(e));
                                onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'cuotas')), (s) => {
                                    const c = {}; s.docs.forEach(d => c[d.id] = d.data().list || []); setCuotasArrangement(c);
                                });
                                onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'historial')), (s) => {
                                    setHistorial(s.docs.map(d => ({ ...d.data(), id: d.id })).sort((a,b) => b.timestamp - a.timestamp));
                                });
                                setIsLoading(false);
                            }
                        });
                    } catch (e) {
                        setAuthError(e.code === 'auth/configuration-not-found' ? "Activa el acceso 'Anónimo' en Firebase." : e.message);
                        setIsLoading(false);
                    }
                };
                initAuth();
            }, []);

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            const normalize = (val) => String(val || '').trim().toUpperCase();
            const superNormalize = (val) => String(val || '').replace(/\(.*?\)/g, '').replace(/[^a-zA-Z0-9]/g, '').toUpperCase();

            const calculatedData = useMemo(() => {
                const today = new Date();
                return masterItems.flatMap(item => {
                    const skuKey = normalize(item.codArt);
                    const stock = stockData[skuKey] || 0;
                    const oc = ocPendientes[skuKey] || 0;
                    const totalDisp = stock + oc;
                    const comprar = totalDisp < item.puntoPedido;
                    
                    let cantTotalAReponer = 0;
                    if (comprar) {
                        const faltante = item.puntoPedido - totalDisp;
                        cantTotalAReponer = item.lote > 0 ? Math.ceil(faltante / item.lote) * item.lote : faltante;
                    }

                    let fechaSug = '-';
                    if (comprar) {
                        const d = new Date(today);
                        d.setDate(d.getDate() + (item.leadTime || 0));
                        fechaSug = d.toLocaleDateString();
                    }

                    const skuCuotas = cuotasArrangement[skuKey] || [];
                    
                    if (skuCuotas.length === 0) {
                        const provs = Object.keys(contratosData[skuKey] || {});
                        if (provs.length > 0) {
                            return provs.map(pk => {
                                const c = contratosData[skuKey][pk];
                                return { ...item, stock, oc, totalDisp, comprar, fechaSug, proveedor: c.nombreOriginal, contrato: c.contrato, posicion: c.posicion, cuota: 100, cantidadSugerida: cantTotalAReponer, tieneContratoReal: !!c.contrato };
                            });
                        }
                        return [{ ...item, stock, oc, totalDisp, comprar, fechaSug, proveedor: '-', contrato: 'No existe contrato marco', posicion: '-', cuota: 100, cantidadSugerida: cantTotalAReponer, tieneContratoReal: false }];
                    }

                    return skuCuotas.map(q => {
                        const provKey = superNormalize(q.proveedor);
                        const c = contratosData[skuKey]?.[provKey];
                        return { 
                            ...item, stock, oc, totalDisp, comprar, fechaSug, 
                            proveedor: q.proveedorOriginal, 
                            contrato: c ? c.contrato : 'Sin Contrato Marco', 
                            posicion: c ? c.posicion : '-', 
                            cuota: q.cuota,
                            cantidadSugerida: (cantTotalAReponer * q.cuota) / 100,
                            tieneContratoReal: !!(c && c.contrato)
                        };
                    });
                });
            }, [masterItems, stockData, ocPendientes, contratosData, cuotasArrangement]);

            const filtered = useMemo(() => {
                return calculatedData.filter(i => {
                    const matchSearch = normalize(i.codArt).includes(normalize(searchTerm)) || normalize(i.descripcion).includes(normalize(searchTerm));
                    const matchFilters = Object.keys(filters).every(key => !filters[key] || String(i[key] || '').toLowerCase().includes(filters[key].toLowerCase()));
                    return matchSearch && matchFilters;
                });
            }, [calculatedData, searchTerm, filters]);

            const missingContracts = useMemo(() => {
                const grouped = {};
                calculatedData.filter(i => !i.tieneContratoReal && i.proveedor !== '-').forEach(item => {
                    if (!grouped[item.proveedor]) grouped[item.proveedor] = [];
                    grouped[item.proveedor].push(item);
                });
                return grouped;
            }, [calculatedData]);

            const sendEmailToBuyer = (proveedor, items) => {
                const provKey = superNormalize(proveedor);
                const buyerCode = SUPPLIER_TO_BUYER[provKey] || "GIGLI";
                const emailTo = BUYER_MAPPING[buyerCode];
                const subject = `SCM: REVISIÓN DE CONTRATOS - ${proveedor.toUpperCase()}`;
                
                let body = `Estimado Comprador,\n\nSe han detectado artículos sin contrato marco para ${proveedor.toUpperCase()}:\n\n`;
                items.slice(0, 15).forEach(i => body += `- ${i.codArt}: ${i.descripcion}\n`);
                body += `\nSaludos,\nEquipo Planificación - Crucianelli`;

                const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${emailTo}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                window.open(gmailUrl, '_blank') || (window.location.href = `mailto:${emailTo}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`);
            };

            const exportExcel = async () => {
                const target = filtered.filter(i => i.comprar);
                if (target.length === 0) return showToast("No hay compras para exportar.", "error");

                const ws = XLSX.utils.json_to_sheet(target.map(i => ({
                    'COD ART.': i.codArt, 'DESCRIPCION': i.descripcion, 'CANT. A PEDIR': i.cantidadSugerida,
                    'STOCK': i.stock, 'OC PEND.': i.oc, 'PTO PEDIDO': i.puntoPedido, 'PROVEEDOR': i.proveedor, 
                    'CONTRATO': i.contrato, 'POSICION': i.posicion, 'FECHA SUG.': i.fechaSug
                })));
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Plan");
                XLSX.writeFile(wb, `Plan_Crucianelli_${new Date().toISOString().split('T')[0]}.xlsx`);

                if (window.FB && user) {
                    const { db, appId, addDoc, collection } = window.FB;
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'historial'), {
                        fecha: new Date().toLocaleString(), timestamp: Date.now(), count: target.length, itemsData: target
                    });
                }
                showToast("Plan guardado en la nube.");
            };

            const handleFileUpload = (e, type) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    const data = XLSX.utils.sheet_to_json(XLSX.read(evt.target.result, {type: 'binary'}).Sheets[XLSX.read(evt.target.result, {type: 'binary'}).SheetNames[0]]);
                    if (!window.FB || !user) return;
                    const { db, appId, doc, setDoc, writeBatch } = window.FB;

                    if (type === 'master') {
                        const batch = writeBatch(db);
                        data.forEach(row => {
                            const sku = normalize(row['SKU / COD ART.'] || row['COD ART.'] || row['SKU']);
                            if (sku) batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'master', sku), {
                                codArt: sku, descripcion: row['DESCRIPCIÓN'] || row['DESCRIPCION'] || 'S/D',
                                puntoPedido: Number(row['PUNTO PEDIDO']) || 0,
                                lote: Number(row['LOTE COMPRA']) || Number(row['LOTE']) || 0,
                                leadTime: Number(row['LEAD TIME']) || 0
                            });
                        });
                        await batch.commit();
                        showToast("Maestro actualizado.");
                    } else if (type === 'stock') {
                        const n = { ...stockData };
                        data.forEach(row => {
                            const sku = normalize(row['SKU / COD ART.'] || row['COD ART.'] || row['SKU']);
                            if (sku) n[sku] = (n[sku] || 0) + (Number(row['STOCK INICIAL']) || 0);
                        });
                        setStockData(n);
                    } else if (type === 'oc') {
                        const n = { ...ocPendientes };
                        data.forEach(row => {
                            const sku = normalize(row['SKU / COD ART.'] || row['COD ART.'] || row['SKU']);
                            if (sku) n[sku] = (n[sku] || 0) + (Number(row['OC. PENDIENTE']) || 0);
                        });
                        setOcPendientes(n);
                    } else if (type === 'contrato') {
                        const n = { ...contratosData };
                        data.forEach(row => {
                            const sku = normalize(row['SKU / COD ART.'] || row['COD ART.'] || row['SKU']);
                            const pk = superNormalize(row['PROVEEDOR']);
                            if (sku && pk) {
                                if (!n[sku]) n[sku] = {};
                                n[sku][pk] = { contrato: String(row['CONTRATO MARCO'] || '').trim(), posicion: String(row['POSICION'] || '').trim(), nombreOriginal: String(row['PROVEEDOR'] || '').trim() };
                            }
                        });
                        setContratosData(n);
                    } else if (type === 'cuota') {
                        const groups = {};
                        data.forEach(row => {
                            const sku = normalize(row['SKU / COD ART.'] || row['COD ART.'] || row['SKU']);
                            if (sku) {
                                if (!groups[sku]) groups[sku] = [];
                                groups[sku].push({ proveedor: superNormalize(row['PROVEEDOR']), cuota: Number(row['CUOTA']) || 0, proveedorOriginal: String(row['PROVEEDOR'] || '').trim() });
                            }
                        });
                        for (const sku in groups) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'cuotas', sku), { list: groups[sku] });
                    }
                };
                reader.readAsBinaryString(file);
            };

            if (authError) return <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white p-10 text-center"><div className="bg-red-500/10 p-10 rounded-3xl border border-red-500/30 max-w-lg shadow-2xl"> <Icons.Alert size={64} className="mx-auto text-red-500 mb-6" /> <h2 className="text-2xl font-black uppercase mb-4">Error de Configuración</h2> <p className="text-slate-400 mb-8">{authError}</p> <button onClick={() => window.location.reload()} className="bg-white text-slate-900 px-10 py-4 rounded-2xl font-black uppercase text-xs">Reintentar</button> </div></div>;

            if (isLoading) return <div className="min-h-screen flex flex-col items-center justify-center bg-slate-950 text-white"><div className="loader mb-8"></div><p className="font-black uppercase tracking-[0.3em] text-xs animate-pulse">Sincronizando Crucianelli Cloud...</p></div>;

            return (
                <div className="min-h-screen pb-20">
                    {toast && <div className={`fixed bottom-10 right-10 z-[200] px-10 py-5 rounded-[2rem] shadow-2xl text-white font-black text-xs uppercase tracking-widest toast-enter ${toast.type === 'error' ? 'bg-red-600' : 'bg-emerald-600'}`}>{toast.message}</div>}

                    {showNotifyModal && (
                        <div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-2xl shadow-2xl overflow-hidden border border-slate-200 animate-slideIn">
                                <div className="bg-slate-900 p-6 text-white flex justify-between items-center">
                                    <div className="flex items-center gap-3"><div className="bg-amber-500 p-2 rounded-lg text-slate-900"><Icons.Alert /></div> <h3 className="font-black uppercase text-sm tracking-widest">Alertas de Contratos</h3></div>
                                    <button onClick={() => setShowNotifyModal(false)}><Icons.Close /></button>
                                </div>
                                <div className="p-6 max-h-[60vh] overflow-y-auto space-y-4 no-scrollbar">
                                    {Object.entries(missingContracts).map(([prov, items]) => (
                                        <div key={prov} className="bg-slate-50 p-5 rounded-2xl border border-slate-200 flex justify-between items-center hover:border-red-200 transition-colors">
                                            <div className="flex-1"><h4 className="font-black text-red-600 uppercase text-xs mb-1">{prov}</h4><p className="text-[10px] font-bold text-slate-500 uppercase tracking-tight">{items.length} ítems sin contrato marco</p></div>
                                            <button onClick={() => sendEmailToBuyer(prov, items)} className="bg-slate-900 text-white px-6 py-2.5 rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center gap-2 hover:bg-red-600 transition-all"><Icons.Mail /> Notificar</button>
                                        </div>
                                    ))}
                                    {Object.keys(missingContracts).length === 0 && <p className="text-center p-10 text-slate-300 font-black uppercase">Todos los contratos están en regla</p>}
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="bg-white border-b p-6 flex justify-between items-center shadow-sm sticky top-0 z-50">
                        <div className="flex items-center gap-6"><img src="https://i.ibb.co/Mx5tJYY8/logo-jpg.jpg" alt="Logo" className="h-10 w-auto" /> <h1 className="text-xl font-black uppercase tracking-tighter">PLANIFICADOR <span className="text-red-600">SCM</span></h1></div>
                        <nav className="flex gap-2">
                            {['planificacion', 'maestro', 'importar', 'historial'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`text-[10px] font-black uppercase tracking-widest px-6 py-3 rounded-2xl transition-all ${activeTab === t ? 'bg-slate-900 text-white shadow-xl' : 'text-slate-400 hover:bg-slate-50'}`}>{t}</button>
                            ))}
                        </nav>
                    </header>

                    <main className="max-w-[1800px] mx-auto p-6 md:p-10">
                        {activeTab === 'planificacion' && (
                            <div className="space-y-6">
                                <div className="bg-white p-8 rounded-[3rem] border flex flex-col md:flex-row gap-6 justify-between items-center shadow-sm">
                                    <div className="relative w-full md:w-[500px]"><div className="absolute left-5 top-4.5 text-slate-300"><Icons.Search /></div> <input type="text" placeholder="Buscar por código o descripción..." className="w-full bg-slate-50 border-none pl-14 pr-8 py-4.5 rounded-3xl text-sm outline-none focus:ring-2 focus:ring-red-500 font-bold uppercase" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} /></div>
                                    <div className="flex gap-3 w-full md:w-auto">
                                        <button onClick={() => setShowNotifyModal(true)} className="flex-1 md:flex-none bg-slate-900 text-white px-10 py-4.5 rounded-3xl font-black text-xs uppercase hover:bg-red-600 transition-all flex items-center justify-center gap-3"><Icons.Alert /> Faltantes</button>
                                        <button onClick={exportExcel} className="flex-1 md:flex-none bg-emerald-600 text-white px-12 py-4.5 rounded-3xl font-black text-xs uppercase hover:bg-emerald-700 transition-all shadow-xl shadow-emerald-100 flex items-center justify-center gap-3"><Icons.Download /> Generar Compra</button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-[3.5rem] border shadow-2xl overflow-hidden">
                                    <div className="overflow-x-auto max-h-[70vh] no-scrollbar">
                                        <table className="w-full text-[10px] text-left border-collapse">
                                            <thead className="bg-slate-900 text-white font-black uppercase sticky top-0 z-10">
                                                <tr>
                                                    <th className="p-4">Cod Art.</th><th className="p-4">Descripción</th><th className="p-4 text-center">Stock</th><th className="p-4 text-center">OC Pend.</th><th className="p-4 text-center">Pto Pedido</th><th className="p-4 text-center">Lote</th><th className="p-4 text-center bg-orange-600">Cant. Pedir</th><th className="p-4 text-center">¿Comprar?</th><th className="p-4 text-center">Fecha Sug.</th><th className="p-4">Proveedor</th><th className="p-4">Contrato</th><th className="p-4 text-center">Pos.</th><th className="p-4 text-center">Cuota %</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y font-bold text-slate-700">
                                                <tr className="bg-slate-800 text-slate-400 sticky top-[38px] z-10">
                                                    {['codArt', 'descripcion', 'stock', 'oc', 'puntoPedido', 'lote', 'cantidadSugerida', 'comprar', 'fechaSug', 'proveedor', 'contrato', 'posicion', 'cuota'].map(c => <th key={c} className="p-2 bg-slate-800 border-none"><input className="w-full p-1 bg-slate-700 border-none rounded text-[8px] outline-none text-white font-normal" placeholder="..." onChange={e => setFilters({...filters, [c]: e.target.value})} /></th>)}
                                                </tr>
                                                {filtered.map((i, idx) => (
                                                    <tr key={`${i.codArt}-${idx}`} className={i.comprar ? 'bg-red-50/50' : 'hover:bg-slate-50'}>
                                                        <td className="p-4 font-black text-red-600">{i.codArt}</td><td className="p-4 uppercase truncate max-w-xs">{i.descripcion}</td><td className="p-4 text-center text-slate-400">{i.stock}</td><td className="p-4 text-center text-orange-400">{i.oc}</td><td className="p-4 text-center text-slate-400 font-bold">{i.puntoPedido}</td><td className="p-4 text-center text-slate-400">{i.lote}</td><td className="p-4 text-center font-black text-slate-900 bg-red-100/30">{i.cantidadSugerida}</td><td className="p-4 text-center font-black">{i.comprar ? <span className="text-red-600">SÍ</span> : <span className="text-slate-200">NO</span>}</td><td className="p-4 text-center font-bold text-emerald-600">{i.fechaSug}</td><td className="p-4 uppercase italic font-black text-[9px]">{i.proveedor}</td><td className={`p-4 uppercase text-[9px] ${!i.tieneContratoReal ? 'text-red-400 italic' : 'text-slate-400'}`}>{i.contrato}</td><td className="p-4 text-center text-slate-400">{i.posicion}</td><td className="p-4 text-center"><span className="bg-emerald-600 text-white px-2.5 py-0.5 rounded-full text-[8px] font-black">{i.cuota}%</span></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'maestro' && (
                            <div className="max-w-5xl mx-auto space-y-8">
                                <div className="bg-slate-900 p-12 rounded-[4rem] text-center text-white shadow-2xl relative overflow-hidden">
                                    <div className="relative z-10">
                                        <Icons.Cloud className="mx-auto mb-6 text-red-500" size={60} />
                                        <h3 className="font-black uppercase text-3xl mb-2 tracking-tighter">Maestro de Productos Cloud</h3>
                                        <p className="text-slate-400 text-sm mb-10 font-medium italic">Base de datos compartida globalmente</p>
                                        <label className="inline-block bg-red-600 text-white px-12 py-5 rounded-3xl font-black cursor-pointer hover:bg-red-700 transition-all shadow-xl active:scale-95 tracking-widest uppercase text-xs">Subir Maestro (XLSX)<input type="file" className="hidden" onChange={e => handleFileUpload(e, 'master')} /></label>
                                    </div>
                                    <div className="absolute top-0 right-0 -mr-20 -mt-20 w-80 h-80 bg-red-600/10 rounded-full blur-3xl"></div>
                                </div>
                                <div className="bg-white rounded-[3rem] border overflow-hidden max-h-[50vh] overflow-y-auto no-scrollbar shadow-sm">
                                    <table className="w-full text-[10px] text-left border-collapse">
                                        <thead className="bg-slate-50 font-black uppercase text-slate-400 border-b sticky top-0"><tr><th className="p-6">Código</th><th className="p-6">Descripción</th><th className="p-6 text-center">Pto Pedido</th><th className="p-6 text-center">Lote</th><th className="p-6 text-center">LT</th><th className="p-6 text-center">Acción</th></tr></thead>
                                        <tbody className="divide-y font-bold">{masterItems.map(i => <tr key={i.codArt} className="hover:bg-slate-50"><td className="p-6 font-black">{i.codArt}</td><td className="p-6 text-slate-400 uppercase">{i.descripcion}</td><td className="p-6 text-center">{i.puntoPedido}</td><td className="p-6 text-center">{i.lote}</td><td className="p-6 text-center">{i.leadTime}d</td><td className="p-6 text-center"><button onClick={async () => { if(window.FB) { await window.FB.deleteDoc(window.FB.doc(window.FB.db, 'artifacts', window.FB.appId, 'public', 'data', 'master', i.codArt)); showToast("Eliminado"); } }} className="text-slate-200 hover:text-red-600 transition-all p-2"><Icons.Trash size={20} /></button></td></tr>)}</tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'importar' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-8">
                                <ImportCard title="Stock Inicial" count={Object.keys(stockData).length} onFile={e => handleFileUpload(e, 'stock')} icon={Icons.Upload} description="Sesión actual" />
                                <ImportCard title="OC Pendientes" count={Object.keys(ocPendientes).length} onFile={e => handleFileUpload(e, 'oc')} icon={Icons.History} description="Sesión actual" />
                                <ImportCard title="Contratos Marco" count={Object.keys(contratosData).length} onFile={e => handleFileUpload(e, 'contrato')} icon={Icons.Cloud} description="Sesión actual" />
                                <ImportCard title="Cuotas Reparto" count={Object.keys(cuotasArrangement).length} onFile={e => handleFileUpload(e, 'cuota')} icon={Icons.Users} highlight description="Fijo en Nube" />
                                <div className="bg-red-600 p-10 rounded-[3.5rem] text-center text-white flex flex-col justify-center shadow-xl">
                                    <Icons.History size={48} className="mx-auto mb-4 opacity-50" />
                                    <h4 className="font-black uppercase text-xl">Auto Sync</h4>
                                    <p className="text-[10px] font-bold opacity-70 uppercase mt-2">Maestro y Cuotas están vinculados a la nube</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'historial' && (
                            <div className="max-w-4xl mx-auto space-y-6">
                                <div className="text-center mb-12"><h2 className="text-4xl font-black uppercase tracking-tighter">Historial Logístico</h2><p className="text-slate-400 text-[10px] font-black uppercase tracking-[0.4em] mt-3">Registro Global de Compras</p></div>
                                {historial.map(h => (
                                    <div key={h.id} className="bg-white p-8 rounded-[2.5rem] border-l-[15px] border-l-red-600 shadow-sm flex flex-col md:flex-row justify-between items-center gap-8 group hover:scale-[1.02] transition-all">
                                        <div className="text-center md:text-left"><p className="font-black text-slate-900 text-xl uppercase tracking-tighter">{h.fecha}</p><p className="text-[11px] text-slate-400 font-black uppercase tracking-widest mt-1 italic">Total: {h.count} artículos en el plan</p></div>
                                        <button onClick={() => {
                                            const ws = XLSX.utils.json_to_sheet(h.itemsData);
                                            const wb = XLSX.utils.book_new();
                                            XLSX.utils.book_append_sheet(wb, ws, "Plan Recuperado");
                                            XLSX.writeFile(wb, `Plan_Recuperado_${h.fecha.replace(/[/:\s]/g, '_')}.xlsx`);
                                        }} className="bg-slate-950 text-white px-10 py-4.5 rounded-3xl text-[10px] font-black uppercase tracking-widest hover:bg-red-600 transition-all shadow-xl active:scale-95 flex items-center gap-4"><Icons.Download size={20} /> Recuperar Excel</button>
                                    </div>
                                ))}
                                {historial.length === 0 && <div className="p-40 text-center text-slate-200 font-black text-5xl border-8 border-dashed rounded-[5rem] uppercase tracking-widest">Sin Historial</div>}
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 bg-slate-950 text-white text-[10px] py-4 px-10 flex justify-between items-center uppercase font-black z-50 border-t border-white/5">
                        <span className="flex items-center gap-4"><div className="w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_15px_#22c55e] animate-pulse"></div> SCM Crucianelli v2.0 - Cloud Enabled</span>
                        <span className="opacity-40 italic">Armstrong, Santa Fe - Argentina</span>
                    </footer>
                </div>
            );
        }

        const ImportCard = ({ title, count, onFile, icon: Icon, highlight, description }) => (
            <div className={`bg-white p-10 rounded-[3.5rem] border shadow-sm text-center group hover:shadow-2xl transition-all relative overflow-hidden ${highlight ? 'border-red-200 bg-red-50/10' : 'border-slate-100'}`}>
                <div className={`w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-6 transition-all ${highlight ? 'bg-red-600 text-white shadow-xl shadow-red-200' : 'bg-slate-50 text-slate-300 group-hover:bg-slate-950 group-hover:text-white'}`}><Icon size={32} /></div>
                <h3 className="font-black text-xs uppercase text-slate-900 mb-1 tracking-tight">{title}</h3>
                <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-6 italic">{description}</p>
                <p className="text-4xl font-black mb-10 tracking-tighter">{count}</p>
                <label className="bg-slate-950 text-white block py-4.5 rounded-[2rem] text-[10px] font-black uppercase cursor-pointer hover:bg-red-600 transition-all active:scale-95 tracking-widest shadow-lg">Subir Archivo<input type="file" className="hidden" onChange={onFile} /></label>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
